name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SSF2ModManager.sln

      - name: Build Release
        run: dotnet build SSF2ModManager.sln -c Release --no-restore

      - name: Test
        run: dotnet test SSF2ModManager.sln -c Release --no-build --verbosity normal

      - name: Publish (self-contained single-file)
        run: dotnet publish SSF2ModManager.csproj -c Release -r win-x64 -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSF2ModManager-win-x64-portable
          path: publish/
